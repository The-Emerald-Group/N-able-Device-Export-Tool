<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald · Device Export</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #080c10;
            --surface:   #0c1219;
            --surface2:  #101820;
            --surface3:  #141f2e;
            --border:    #1a2838;
            --border2:   #223040;
            --accent:    #00c8f0;
            --accent2:   #0099bb;
            --accent-d:  rgba(0,200,240,.07);
            --accent-g:  rgba(0,200,240,.14);
            --text:      #ddeef8;
            --text2:     #6a8ca8;
            --text3:     #334a5c;
            --green:     #00e59a;
            --red:       #ff4a60;
            --amber:     #ffb830;
            --mono:      'IBM Plex Mono', monospace;
            --sans:      'IBM Plex Sans', sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Atmospheric grid */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(0,200,240,.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,200,240,.018) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none; z-index: 0;
        }

        /* Radial glow */
        body::after {
            content: '';
            position: fixed;
            top: -120px; left: 50%; transform: translateX(-50%);
            width: 700px; height: 400px;
            background: radial-gradient(ellipse, rgba(0,170,210,.055) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        .wrap {
            position: relative; z-index: 1;
            max-width: 1080px;
            margin: 0 auto;
            padding: 44px 28px 80px;
        }

        /* ── Header ─────────────────────────────────────────────────── */
        header {
            display: flex; align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .brand { display: flex; flex-direction: column; gap: 4px; }
        .brand-tag {
            font-family: var(--mono); font-size: .62rem;
            letter-spacing: .22em; color: var(--accent);
            text-transform: uppercase;
        }
        h1 { font-size: 1.75rem; font-weight: 600; letter-spacing: -.02em; line-height: 1; }
        h1 em { color: var(--accent); font-style: normal; }
        .header-right {
            font-family: var(--mono); font-size: .68rem;
            color: var(--text3); text-align: right; line-height: 1.9;
        }
        .dot {
            display: inline-block; width: 6px; height: 6px; border-radius: 50%;
            background: var(--green); margin-right: 5px;
            animation: blink 2.4s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

        /* ── Two-column layout ──────────────────────────────────────── */
        .layout {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 20px;
            align-items: start;
        }

        /* ── Panel shell ────────────────────────────────────────────── */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .panel-head {
            padding: 14px 20px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .panel-title {
            font-family: var(--mono); font-size: .62rem;
            letter-spacing: .18em; color: var(--text2);
            text-transform: uppercase;
        }
        .panel-body { padding: 16px 20px; }

        /* ── Customer search ────────────────────────────────────────── */
        .search-wrap { position: relative; margin-bottom: 12px; }
        .search-icon {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: var(--text3); font-size: .9rem; pointer-events: none;
        }
        #customer-search {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 7px;
            padding: 10px 12px 10px 34px;
            color: var(--text); font-family: var(--sans); font-size: .9rem;
            outline: none; transition: border-color .18s, box-shadow .18s;
        }
        #customer-search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-g);
        }
        #customer-search::placeholder { color: var(--text3); }
        #customer-search:disabled { opacity: .5; cursor: not-allowed; }

        .list-meta {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .list-meta-label { font-family: var(--mono); font-size: .6rem; color: var(--text3); text-transform: uppercase; letter-spacing: .15em; }
        .badge {
            font-family: var(--mono); font-size: .66rem;
            color: var(--accent); background: var(--accent-d);
            border: 1px solid rgba(0,200,240,.2);
            border-radius: 4px; padding: 2px 7px;
        }

        #customer-list {
            max-height: 340px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 3px;
            scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
        }
        .cust-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 9px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer; font-size: .875rem;
            transition: border-color .15s, background .15s, transform .1s;
            gap: 8px;
        }
        .cust-item:hover {
            border-color: var(--accent); background: var(--accent-d);
            transform: translateX(2px);
        }
        .cust-item.selected { border-color: var(--accent); background: var(--accent-d); }
        .cust-name { flex: 1; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cust-check { color: var(--accent); font-size: .8rem; opacity: 0; transition: opacity .15s; flex-shrink: 0; }
        .cust-item.selected .cust-check { opacity: 1; }

        .skeleton { background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; height: 36px; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        .empty-msg { padding: 24px; text-align: center; color: var(--text3); font-family: var(--mono); font-size: .75rem; }
        .err-msg { padding: 16px; background: rgba(255,74,96,.06); border: 1px solid rgba(255,74,96,.2); border-radius: 7px; color: var(--red); font-size: .82rem; font-family: var(--mono); text-align: center; }

        /* ── Right column ───────────────────────────────────────────── */
        .right-col { display: flex; flex-direction: column; gap: 16px; }

        /* ── Column selector ────────────────────────────────────────── */
        .col-section { margin-bottom: 6px; }
        .col-section-name {
            font-family: var(--mono); font-size: .6rem; letter-spacing: .18em;
            color: var(--accent); text-transform: uppercase;
            margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
        }
        .col-section-name::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .col-grid { display: flex; flex-wrap: wrap; gap: 6px; }

        .col-chip {
            display: flex; align-items: center; gap: 5px;
            padding: 5px 10px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 5px;
            cursor: pointer; font-size: .78rem; font-family: var(--mono);
            color: var(--text2);
            transition: all .15s; user-select: none;
            white-space: nowrap;
        }
        .col-chip:hover { border-color: var(--accent); color: var(--text); }
        .col-chip.active {
            background: var(--accent-d);
            border-color: var(--accent);
            color: var(--accent);
        }
        .col-chip .chip-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--border2); flex-shrink: 0;
            transition: background .15s;
        }
        .col-chip.active .chip-dot { background: var(--accent); }

        /* Presets bar */
        .presets-bar {
            display: flex; align-items: center; gap: 8px;
            flex-wrap: wrap;
        }
        .preset-label { font-family: var(--mono); font-size: .6rem; letter-spacing: .15em; color: var(--text3); text-transform: uppercase; margin-right: 4px; }
        .preset-btn {
            padding: 4px 12px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 4px;
            color: var(--text2); font-family: var(--mono); font-size: .72rem;
            cursor: pointer; transition: all .15s;
        }
        .preset-btn:hover { border-color: var(--accent); color: var(--accent); }

        .select-all-btn {
            padding: 4px 10px;
            background: transparent; border: 1px solid var(--border2);
            border-radius: 4px; color: var(--text3);
            font-family: var(--mono); font-size: .68rem; cursor: pointer;
            transition: all .15s; margin-left: auto;
        }
        .select-all-btn:hover { border-color: var(--text2); color: var(--text2); }

        /* Selection counter */
        .col-counter {
            font-family: var(--mono); font-size: .7rem; color: var(--text2);
        }
        .col-counter strong { color: var(--accent); }

        /* ── Export panel ───────────────────────────────────────────── */
        .export-panel-body {
            display: flex; align-items: center; gap: 20px;
            padding: 20px;
        }
        .export-info { flex: 1; }
        .export-target-label { font-family: var(--mono); font-size: .6rem; letter-spacing: .15em; color: var(--text3); text-transform: uppercase; margin-bottom: 5px; }
        .export-target-name { font-size: 1.05rem; font-weight: 600; color: var(--text); }
        .export-target-name.placeholder { color: var(--text3); font-weight: 400; font-style: italic; font-size: .9rem; }
        .export-hint { font-family: var(--mono); font-size: .68rem; color: var(--text2); margin-top: 4px; }

        .export-btns { display: flex; gap: 10px; flex-shrink: 0; }

        .btn {
            display: flex; align-items: center; gap: 7px;
            padding: 11px 20px;
            border: none; border-radius: 7px;
            font-family: var(--sans); font-size: .875rem; font-weight: 600;
            cursor: pointer; transition: all .18s; white-space: nowrap;
        }
        .btn:disabled { opacity: .35; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
        .btn-csv {
            background: var(--accent); color: var(--bg);
        }
        .btn-csv:hover:not(:disabled) {
            background: #33d8ff; transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0,200,240,.3);
        }
        .btn-pdf {
            background: var(--surface3); color: var(--text);
            border: 1px solid var(--border2);
        }
        .btn-pdf:hover:not(:disabled) {
            border-color: var(--amber); color: var(--amber);
            background: rgba(255,184,48,.06);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(255,184,48,.15);
        }
        .btn.loading { pointer-events: none; }
        .spinner { width: 13px; height: 13px; border: 2px solid rgba(0,0,0,.2); border-top-color: currentColor; border-radius: 50%; animation: spin .65s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Toast ──────────────────────────────────────────────────── */
        .toast {
            position: fixed; bottom: 28px; right: 28px;
            background: var(--surface2); border: 1px solid var(--border2);
            border-radius: 9px; padding: 12px 18px;
            font-size: .83rem; display: flex; align-items: center; gap: 10px;
            transform: translateY(70px); opacity: 0;
            transition: all .28s cubic-bezier(.34,1.56,.64,1);
            z-index: 999; max-width: 340px;
            box-shadow: 0 8px 32px rgba(0,0,0,.5);
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: var(--green); }
        .toast.error   { border-color: var(--red); }
        .toast.info    { border-color: var(--accent); }

        /* ── Responsive ─────────────────────────────────────────────── */
        @media (max-width: 820px) {
            .layout { grid-template-columns: 1fr; }
            .export-btns { flex-direction: column; }
        }
        @media (max-width: 500px) {
            .wrap { padding: 24px 14px 60px; }
            header { flex-direction: column; align-items: flex-start; gap: 12px; }
        }
    </style>
</head>
<body>
<div class="wrap">

    <header>
        <div class="brand">
            <span class="brand-tag">N-able RMM</span>
            <h1>Device <em>Export</em></h1>
        </div>
        <div class="header-right">
            <div><span class="dot"></span>Connected</div>
            <div id="status-line">Loading…</div>
        </div>
    </header>

    <div class="layout">

        <!-- ── Left: Customer picker ──────────────────────────────── -->
        <div class="panel">
            <div class="panel-head">
                <span class="panel-title">Select Customer</span>
                <span id="cust-badge" class="badge" style="display:none"></span>
            </div>
            <div class="panel-body">
                <div class="search-wrap">
                    <span class="search-icon">⌕</span>
                    <input type="text" id="customer-search" placeholder="Filter customers…" disabled autocomplete="off">
                </div>
                <div class="list-meta">
                    <span class="list-meta-label">Customers</span>
                </div>
                <div id="customer-list">
                    <div class="skeleton"></div>
                    <div class="skeleton" style="opacity:.7;margin-top:3px"></div>
                    <div class="skeleton" style="opacity:.45;margin-top:3px"></div>
                    <div class="skeleton" style="opacity:.25;margin-top:3px"></div>
                </div>
            </div>
        </div>

        <!-- ── Right: Column picker + export ──────────────────────── -->
        <div class="right-col">

            <!-- Column selector -->
            <div class="panel">
                <div class="panel-head">
                    <span class="panel-title">Choose Columns</span>
                    <span class="col-counter">
                        <strong id="sel-count">0</strong> selected
                    </span>
                </div>
                <div class="panel-body">
                    <!-- Presets -->
                    <div class="presets-bar" style="margin-bottom:16px;">
                        <span class="preset-label">Presets</span>
                        <button class="preset-btn" onclick="applyPreset('essential')">Essential</button>
                        <button class="preset-btn" onclick="applyPreset('hardware')">Hardware</button>
                        <button class="preset-btn" onclick="applyPreset('network')">Network</button>
                        <button class="preset-btn" onclick="applyPreset('full')">Full</button>
                        <button class="select-all-btn" id="toggle-all-btn" onclick="toggleAll()">Select All</button>
                    </div>
                    <!-- Column groups rendered by JS -->
                    <div id="col-groups"></div>
                </div>
            </div>

            <!-- Export action panel -->
            <div class="panel">
                <div class="export-panel-body">
                    <div class="export-info">
                        <div class="export-target-label">Export Target</div>
                        <div class="export-target-name placeholder" id="export-name">No customer selected</div>
                        <div class="export-hint" id="export-hint">Select a customer and columns above</div>
                    </div>
                    <div class="export-btns">
                        <button class="btn btn-csv" id="btn-csv" disabled onclick="doExport('csv')">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            CSV
                        </button>
                        <button class="btn btn-pdf" id="btn-pdf" disabled onclick="doExport('pdf')">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                            PDF
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<div class="toast" id="toast">
    <span id="toast-icon"></span>
    <span id="toast-msg"></span>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let allCustomers   = [];
let selectedCustomer = null;
let allColumns     = [];   // [{key, label, group}]
let selectedCols   = new Set();

const PRESETS = {
    essential: ['device_name','device_class','ip_address','os','os_version','ram_total','disk_total','last_seen'],
    hardware:  ['device_name','device_class','cpu','cpu_cores','cpu_speed','ram_total','ram_detail','disk_total','disk_model','system_model','serial_number','motherboard','bios_version'],
    network:   ['device_name','device_class','ip_address','mac_address','os','os_architecture','last_seen'],
    full:      null,  // all columns
};

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type = 'info', icon = 'ℹ️') {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    document.getElementById('toast-icon').textContent = icon;
    t.className = `toast ${type} show`;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 3600);
}

// ── Column loader ─────────────────────────────────────────────────────────────
async function loadColumns() {
    const res  = await fetch('/api/columns');
    const data = await res.json();
    allColumns = data.columns;
    data.defaults.forEach(k => selectedCols.add(k));
    renderColumnPicker();
    updateSelCount();
}

function renderColumnPicker() {
    const groups = {};
    for (const col of allColumns) {
        if (!groups[col.group]) groups[col.group] = [];
        groups[col.group].push(col);
    }

    const container = document.getElementById('col-groups');
    container.innerHTML = '';

    for (const [group, cols] of Object.entries(groups)) {
        const sec = document.createElement('div');
        sec.className = 'col-section';
        sec.innerHTML = `<div class="col-section-name">${group}</div><div class="col-grid" id="grp-${group}"></div>`;
        container.appendChild(sec);

        const grid = sec.querySelector('.col-grid');
        for (const col of cols) {
            const chip = document.createElement('div');
            chip.className = 'col-chip' + (selectedCols.has(col.key) ? ' active' : '');
            chip.dataset.key = col.key;
            chip.innerHTML = `<span class="chip-dot"></span>${col.label}`;
            chip.onclick = () => toggleCol(col.key, chip);
            grid.appendChild(chip);
        }
    }
}

function toggleCol(key, chip) {
    if (selectedCols.has(key)) {
        selectedCols.delete(key);
        chip.classList.remove('active');
    } else {
        selectedCols.add(key);
        chip.classList.add('active');
    }
    updateSelCount();
    updateExportHint();
}

function updateSelCount() {
    document.getElementById('sel-count').textContent = selectedCols.size;
    const toggleBtn = document.getElementById('toggle-all-btn');
    toggleBtn.textContent = selectedCols.size === allColumns.length ? 'Deselect All' : 'Select All';
}

function applyPreset(name) {
    selectedCols.clear();
    const keys = PRESETS[name] || allColumns.map(c => c.key);
    keys.forEach(k => selectedCols.add(k));
    // Re-render chips
    document.querySelectorAll('.col-chip').forEach(chip => {
        chip.classList.toggle('active', selectedCols.has(chip.dataset.key));
    });
    updateSelCount();
    updateExportHint();
}

function toggleAll() {
    if (selectedCols.size === allColumns.length) {
        selectedCols.clear();
    } else {
        allColumns.forEach(c => selectedCols.add(c.key));
    }
    document.querySelectorAll('.col-chip').forEach(chip => {
        chip.classList.toggle('active', selectedCols.has(chip.dataset.key));
    });
    updateSelCount();
    updateExportHint();
}

// ── Customer loader ───────────────────────────────────────────────────────────
async function loadCustomers() {
    try {
        const res  = await fetch('/api/customers');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        allCustomers = data.customers || [];
        document.getElementById('status-line').textContent = `${allCustomers.length} customers`;
        document.getElementById('customer-search').disabled = false;
        renderList(allCustomers);
    } catch (e) {
        document.getElementById('customer-list').innerHTML =
            `<div class="err-msg">⚠ Failed to load customers<br><small>${e.message}</small></div>`;
        document.getElementById('status-line').textContent = 'Connection error';
        toast('Could not connect to N-able API', 'error', '⚠️');
    }
}

function renderList(customers) {
    const list  = document.getElementById('customer-list');
    const badge = document.getElementById('cust-badge');
    if (!customers.length) {
        list.innerHTML = '<div class="empty-msg">No customers match</div>';
        badge.style.display = 'none'; return;
    }
    badge.textContent = customers.length < allCustomers.length
        ? `${customers.length} / ${allCustomers.length}` : allCustomers.length;
    badge.style.display = 'inline';

    list.innerHTML = customers.map(c => `
        <div class="cust-item ${selectedCustomer === c ? 'selected' : ''}"
             onclick="selectCustomer('${c.replace(/'/g,"\\'")}')">
            <span class="cust-name">${c}</span>
            <span class="cust-check">✓</span>
        </div>`).join('');
}

document.getElementById('customer-search').addEventListener('input', function () {
    const q = this.value.trim().toLowerCase();
    renderList(q ? allCustomers.filter(c => c.toLowerCase().includes(q)) : allCustomers);
});

function selectCustomer(name) {
    selectedCustomer = name;
    document.querySelectorAll('.cust-item').forEach(el => {
        el.classList.toggle('selected', el.querySelector('.cust-name').textContent === name);
    });
    const nameEl = document.getElementById('export-name');
    nameEl.textContent = name;
    nameEl.classList.remove('placeholder');
    updateExportHint();
    updateExportBtns();
}

function updateExportHint() {
    const el = document.getElementById('export-hint');
    if (!selectedCustomer) { el.textContent = 'Select a customer and columns above'; return; }
    const n = selectedCols.size;
    el.textContent = n === 0
        ? 'No columns selected — pick at least one'
        : `${n} column${n===1?'':'s'} selected`;
}

function updateExportBtns() {
    const ok = !!selectedCustomer && selectedCols.size > 0;
    document.getElementById('btn-csv').disabled = !ok;
    document.getElementById('btn-pdf').disabled = !ok;
}

// ── Export ────────────────────────────────────────────────────────────────────
async function doExport(fmt) {
    if (!selectedCustomer || selectedCols.size === 0) return;

    const btnId   = fmt === 'pdf' ? 'btn-pdf' : 'btn-csv';
    const btn     = document.getElementById(btnId);
    const origHTML = btn.innerHTML;
    const label   = fmt.toUpperCase();

    btn.innerHTML = `<div class="spinner"></div> Generating ${label}…`;
    btn.classList.add('loading');
    btn.disabled = true;

    const other = document.getElementById(fmt === 'pdf' ? 'btn-csv' : 'btn-pdf');
    other.disabled = true;

    document.getElementById('export-hint').textContent = `Fetching device data… this may take a moment`;
    toast(`Preparing ${label} for ${selectedCustomer}…`, 'info', '⏳');

    try {
        const cols = Array.from(selectedCols).join(',');
        const url  = `/api/export?customer=${encodeURIComponent(selectedCustomer)}&format=${fmt}&columns=${encodeURIComponent(cols)}`;
        const res  = await fetch(url);

        if (!res.ok) {
            const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
            throw new Error(err.error || `HTTP ${res.status}`);
        }

        const blob = await res.blob();
        const disp = res.headers.get('Content-Disposition') || '';
        const match = disp.match(/filename="([^"]+)"/);
        const filename = match ? match[1] : `export_${Date.now()}.${fmt}`;

        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);

        document.getElementById('export-hint').textContent =
            `Downloaded at ${new Date().toLocaleTimeString()}`;
        toast(`${selectedCustomer} — ${label} downloaded`, 'success', '✅');

    } catch (e) {
        document.getElementById('export-hint').textContent = `Export failed: ${e.message}`;
        toast(`Export failed: ${e.message}`, 'error', '⚠️');
    } finally {
        btn.innerHTML = origHTML;
        btn.classList.remove('loading');
        updateExportBtns();
    }
}

// Keep export buttons in sync whenever columns change
const origToggleCol = toggleCol;
const origApplyPreset = applyPreset;
const origToggleAll  = toggleAll;

// Patch col operations to also update buttons
(function(){
    const ops = ['toggleCol','applyPreset','toggleAll'];
    const wrap = fn => function() { fn.apply(this, arguments); updateExportBtns(); };
    window.toggleCol   = (key, chip) => { origToggleCol(key, chip); updateExportBtns(); };
    window.applyPreset = (name)      => { origApplyPreset(name);    updateExportBtns(); };
    window.toggleAll   = ()          => { origToggleAll();           updateExportBtns(); };
})();

// ── Init ──────────────────────────────────────────────────────────────────────
Promise.all([loadColumns(), loadCustomers()]);
</script>
